<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Loja Tech Store</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f4f4f4;
}

header {
  background: #111;
  color: white;
  padding: 20px;
  text-align: center;
  font-size: 28px;
}

.banner {
  background: url('https://images.unsplash.com/photo-1511707171634-5f897ff02aa9') center;
  background-size: cover;
  padding: 100px;
  color: white;
  text-align: center;
}

.section {
  padding: 40px;
  text-align: center;
}

.products {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
}

.card {
  background: white;
  width: 200px;
  margin: 15px;
  padding: 15px;
  border-radius: 10px;
}

.card img {
  width: 100%;
  border-radius: 10px;
}

button {
  background: #111;
  color: white;
  border: none;
  padding: 10px;
  border-radius: 8px;
  cursor: pointer;
}

footer {
  background: #111;
  color: white;
  padding: 20px;
  text-align: center;
}
</style>
</head>

<body>

<header>
🛒 Tech Store
</header>

<div class="banner">
<h1>Os melhores produtos</h1>
<p>Compre tecnologia com qualidade</p>
</div>

<div class="section">
<h2>Produtos</h2>

<div class="products">

<div class="card">
<img src="https://images.unsplash.com/photo-1510557880182-3c2b7f2cba4c">
<h3>Celular</h3>
<p>R$1200</p>
<button>Comprar</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1517336714731-489689fd1ca8">
<h3>Notebook</h3>
<p>R$2500</p>
<button>Comprar</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1518441902114-17b0d6e6fdf7">
<h3>Fone</h3>
<p>R$150</p>
<button>Comprar</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1585386959984-a41552231658">
<h3>Teclado</h3>
<p>R$200</p>
<button>Comprar</button>
</div>

</div>
</div>

<div class="section">
<h2>Sobre a loja</h2>
<p>Somos uma loja especializada em tecnologia com os melhores preços.</p>
</div>

<div class="section">
<h2>Contato</h2>

<a href="https://wa.me/5531999999999">
<button>WhatsApp</button>
</a>

<br><br>

<a href="https://instagram.com/seuusuario">
<button>Instagram</button>
</a>

</div>

<footer>
© 2026 Tech Store
</footer>
